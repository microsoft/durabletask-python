name: Type Check (pyright)

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
      - "azuremanaged-v*"
      - "azurefunctions-v*"
  pull_request:
    branches:
      - "main"

permissions:
  contents: read

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10 (lowest supported)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[azure-blob-payloads,opentelemetry]"
          pip install -e ./durabletask-azuremanaged
          pip install pyright

      - name: Run pyright (strict, Python 3.10)
        run: pyright

  pyright-azurefunctions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13 (lowest supported by azure-functions-durable)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packages and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[azure-blob-payloads,opentelemetry]"
          pip install -e ./azure-functions-durable
          pip install pyright

      - name: Run pyright (strict, Python 3.13)
        run: pyright -p azure-functions-durable/pyrightconfig.json
